<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <rect width="24" height="24" rx="5" fill="#111"/>
  <style>
    @keyframes s {
      0%   { transform: translateY(0)    scaleX(1);    opacity: .9 }
      50%  { transform: translateY(-3px) scaleX(.85);  opacity: .5 }
      100% { transform: translateY(-6px) scaleX(1.1);  opacity: 0  }
    }
    .v { transform-box: fill-box; transform-origin: 50% 100%; }
    .v1 { animation: s 2s ease-in-out infinite; }
    .v2 { animation: s 2s .65s ease-in-out infinite; }
    .v3 { animation: s 2s 1.3s ease-in-out infinite; }
  </style>
  <path class="v v1" d="M8 10C6.5 8 9.5 6 8 4"    stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>
  <path class="v v2" d="M12 10C10.5 8 13.5 6 12 4" stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>
  <path class="v v3" d="M16 10C14.5 8 17.5 6 16 4" stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M4 11h16v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7z" stroke="#e5e5e5" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M20 13h1a1.5 1.5 0 0 1 0 3h-1"            stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M6 22h12"                                  stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>
</svg>
